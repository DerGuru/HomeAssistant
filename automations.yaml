    - select.heizung_programmschalter
  conditions:
  - condition: state
    entity_id: sensor.heizungsbetriebsmodus
    state: Heating
  - condition: state
    entity_id: binary_sensor.terassentur
    state: 'on'
  - condition: state
    entity_id: select.heizung_programmschalter
    state: Programm
  actions:
  - choose:
    - conditions:
      - condition: state
        entity_id: binary_sensor.heizung_verdichter
        state: 'off'
      sequence:
      - action: select.select_option
        target:
          entity_id: select.heizung_programmschalter
        data:
          option: Warmwasser
      - delay:
          hours: 0
          minutes: 0
          seconds: 30
          milliseconds: 0
        enabled: false
    - conditions:
      - condition: state
        entity_id: binary_sensor.heizung_verdichter
        state: 'on'
      sequence:
      - wait_for_trigger:
        - trigger: state
          entity_id: binary_sensor.heizung_verdichter
          to: 'off'
        - trigger: state
          entity_id: binary_sensor.terassentur
          to: 'off'
        timeout: 00:15:00
        continue_on_timeout: false
      - condition: state
        entity_id: binary_sensor.terassentur
        state: 'on'
      - condition: state
        entity_id: select.heizung_programmschalter
        state: Programm
      - action: select.select_option
        target:
          entity_id: select.heizung_programmschalter
        data:
          option: Warmwasser
  mode: restart
- id: '1775119620638'
  alias: Heizung - Terrassentür geschlossen -> Programm
  description: Wenn die Terassentür geschlossen wird oder die Heizung in den Kühlmodus
    geht, dann wird der Warmwassermodus, der sonst im Heizmodus aktiv ist zum Programmmodus
  triggers:
  - trigger: state
    entity_id: binary_sensor.terassentur
    to: 'off'
  - trigger: state
    entity_id: sensor.heizungsbetriebsmodus
    from: Heating
    to: Cooling
  conditions:
  - condition: state
    entity_id: select.heizung_programmschalter
    state: Warmwasser
  actions:
  - choose:
    - conditions:
      - condition: state
        entity_id: sensor.heizungsbetriebsmodus
        state:
        - Heating
      - condition: numeric_state
        entity_id: sensor.heizung_aussentemp
        above: 22
      sequence:
      - action: select.select_option
        target:
          entity_id: select.heizung_programmschalter
        data:
          option: Warmwasser
    default:
    - action: select.select_option
      target:
        entity_id: select.heizung_programmschalter
      data:
        option: Programm
  mode: queued
  max: 10
