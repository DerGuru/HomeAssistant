- id: '1736946120721'
  alias: Büro OG Fenster auf bei offener Tür unter 15C
  description: Das Fenster in Julias Büro wird geöffnet, während es draussen kalt
    ist. Sie lässt dabei gerne mal die Tür offen und es wird im ganzen Haus kalt.
  triggers:
  - type: opened
    device_id: 3ccc140b0636a9ce097785820311feb7
    entity_id: 3a0a88e9c19b7989f7ea39480a7fb106
    domain: binary_sensor
    trigger: device
  - type: opened
    device_id: 18d445d1153b501d921614deb9c1a922
    entity_id: 20f7df1c21b7e0b039e89eb50640616b
    domain: binary_sensor
    trigger: device
  conditions:
  - condition: numeric_state
    entity_id: sensor.heizung_aussentemp
    below: 15
    enabled: false
  actions:
  - delay:
      hours: 0
      minutes: 5
      seconds: 0
      milliseconds: 0
  - alias: Fenster auf heißt Tür zu!
    repeat:
      while:
      - condition: and
        conditions:
        - type: is_open
          condition: device
          device_id: 3ccc140b0636a9ce097785820311feb7
          entity_id: 3a0a88e9c19b7989f7ea39480a7fb106
          domain: binary_sensor
        - type: is_open
          condition: device
          device_id: 18d445d1153b501d921614deb9c1a922
          entity_id: 20f7df1c21b7e0b039e89eb50640616b
          domain: binary_sensor
      sequence:
      - action: script.tts_with_volume
        metadata: {}
        data:
          target_volume: 0.8
          target_device: 967db56538466d8a21b62255d71f806d
          msg: Fenster auf heißt Tür zu!
        alias: Fenster auf heißt Tür zu!
        enabled: true
      - delay:
          hours: 0
          minutes: 0
          seconds: 30
          milliseconds: 0
    enabled: false
  - if:
    - condition: and
      conditions:
      - type: is_open
        condition: device
        device_id: 3ccc140b0636a9ce097785820311feb7
        entity_id: 3a0a88e9c19b7989f7ea39480a7fb106
        domain: binary_sensor
      - type: is_open
        condition: device
        device_id: 18d445d1153b501d921614deb9c1a922
        entity_id: 20f7df1c21b7e0b039e89eb50640616b
        domain: binary_sensor
    then:
    - action: notify.mobile_app_aphone
      metadata: {}
      data:
        message: Fenster und Tür auf bei Julias Büro.
  mode: restart
