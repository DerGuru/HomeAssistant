- id: '1772186038644'
  alias: HaStartSync
  description: HA Start Heizungsteuerung setzt initialen State
  triggers:
  - event: start
    trigger: homeassistant
  conditions: []
  actions:
  - wait_template: "{{\n  states('sensor.vorlauf_heizkreis') not in ['unknown','unavailable','']\n
      \ and states('sensor.rucklauf_heizkreis') not in ['unknown','unavailable','']\n
      \ and states('switch.heizkreisbadog') not in ['unknown','unavailable','']\n
      \ and states('switch.heizkreisbueroeg') not in ['unknown','unavailable','']\n
      \ and states('switch.heizkreisburoog') not in ['unknown','unavailable','']\n
      \ and states('switch.heizkreiskinderzimmer') not in ['unknown','unavailable','']\n
      \ and states('switch.heizkreisschlafzimmer') not in ['unknown','unavailable','']\n}}"
    timeout: 00:15:00
    continue_on_timeout: true
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ wait.completed }}'
      sequence:
      - data:
          level: warning
          message: 'StartCheck OK: Heizkreis-Entities sind verfügbar. Modus={{ states(''sensor.heizungsbetriebsmodus'')
            }}'
        action: system_log.write
    default:
    - data:
        level: error
        message: 'StartCheck TIMEOUT: Heizkreis-Entities nicht vollständig verfügbar.'
      action: system_log.write
    - stop: HaStartSync abgebrochen wegen Timeout
  - choose:
    - conditions:
      - condition: state
        entity_id: sensor.heizungsbetriebsmodus
        state: Cooling
      sequence:
      - target:
          entity_id: switch.heizkreisbadog
        action: switch.turn_off
    default:
    - target:
        entity_id: switch.heizkreisbadog
      action: switch.turn_on
  - action: script.setheizkreisventilebetriebsmodus
    data: {}
  mode: single
