- id: '1762360814601'
  alias: Bad OG
  description: Öffnet bei Heizen, schließt bei Kühlen. Loggt Entscheidungen.
  triggers:
  - entity_id:
    - sensor.heizungsbetriebsmodus
    trigger: state
  - event: start
    trigger: homeassistant
  - entity_id: switch.heizkreisbadog
    trigger: state
  actions:
  - variables:
      ventil: switch.heizkreisbadog
      kuehl: '{{ is_state(''sensor.heizungsbetriebsmodus'',''Cooling'') }}'
      ziel_an: '{{ not kuehl }}'
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ ziel_an }}'
      sequence:
      - condition: template
        value_template: '{{ is_state(ventil, ''off'') }}'
      - target:
          entity_id: '{{ ventil }}'
        action: switch.turn_on
        data: {}
      - data:
          name: HK Bad
          message: Auf (kuehl={{ kuehl }}, ziel_an={{ ziel_an }})
        action: logbook.log
    - conditions:
      - condition: template
        value_template: '{{ not ziel_an }}'
      sequence:
      - condition: template
        value_template: '{{ is_state(ventil, ''on'') }}'
      - target:
          entity_id: '{{ ventil }}'
        action: switch.turn_off
      - data:
          name: HK Bad
          message: Zu (kuehl={{ kuehl }}, ziel_an={{ ziel_an }})
        action: logbook.log
    default: []
  mode: restart
