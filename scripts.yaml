tts_with_volume:
  alias: TTS_with_Volume
  description: Speichert die aktuelle Lautstärke, erhöht sie, gibt aus und setzt auf
    Original zurück
  mode: queued
  max: 100
  fields:
    msg:
      selector:
        text:
      name: Nachricht
      required: true
    target_device:
      name: Zielgerät (HomePod)
      description: Wähle das HomePod-Device
      selector:
        device:
          multiple: false
      required: true
    target_volume:
      selector:
        number:
          min: 0
          max: 1
          step: 0.05
      default: 0.8
  sequence:
  - variables:
      mp_entity: "{% set entities = device_entities(target_device)\n   | select('match',
        '^media_player\\.')\n   | list %}\n{{ entities[0] if entities|length > 0 else
        '' }}\n"
  - condition: template
    value_template: '{{ mp_entity != '''' }}'
  - variables:
      initial_volume: '{{ state_attr(mp_entity, ''volume_level'') | float(0.4) }}'
  - target:
      entity_id: '{{ mp_entity }}'
    data:
      volume_level: '{{ target_volume }}'
    action: media_player.volume_set
  - action: tts.speak
    metadata: {}
    data:
      cache: true
      media_player_entity_id: '{{ mp_entity }}'
      message: '{{ msg }}'
    target:
      entity_id: tts.google_translate_de_de
  - wait_template: '{{ not is_state(mp_entity, ''playing'') }}'
    timeout: 00:02:00
    continue_on_timeout: true
  - target:
      entity_id: '{{ mp_entity }}'
    data:
      volume_level: '{{ initial_volume }}'
    action: media_player.volume_set
heizkreisventilsteuerung:
  alias: HeizkreisVentilSteuerung
  description: Dispatcher, der je nach Betriebsmodus die Heiz- oder Kuehllogik fuer
    ein Heizkreisventil aufruft.
  mode: queued
  max: 32
  fields:
    zbmini_entity:
      description: Der SONOFF ZBMINIR2 im Raum mit einem Thermostat, der das Heizkreisventil
        steuert
      required: true
  sequence:
  - choose:
    - conditions:
      - condition: state
        entity_id: sensor.heizungsbetriebsmodus
        state: Heating
      sequence:
      - action: script.heizkreisventilsteuerung_heating
        data:
          zbmini_entity: '{{ zbmini_entity }}'
    - conditions:
      - condition: state
        entity_id: sensor.heizungsbetriebsmodus
        state: Cooling
      sequence:
      - action: script.heizkreisventilsteuerung_cooling
        data:
          zbmini_entity: '{{ zbmini_entity }}'
heizkreisventilsteuerung_heating:
  alias: HeizkreisVentilSteuerung Heating
  description: Steuert das Thermostat eines Heizkreisventils im Heizbetrieb - aus
    bei offenem Fenster, sonst heizen.
  mode: queued
  max: 32
  fields:
    zbmini_entity:
      description: Der SONOFF ZBMINIR2 im Raum mit einem Thermostat, der das Heizkreisventil
        steuert
      required: true
  variables:
    area: '{{ area_id(zbmini_entity) }}'
    thermostat: '{{ expand(area_entities(area)) | selectattr(''domain'',''eq'',''climate'')
      | map(attribute=''entity_id'') | list | first }}'
  sequence:
  - condition: template
    value_template: '{{ area is not none }}'
  - condition: template
    value_template: '{{ thermostat is not none }}'
  - action: script.any_window_open
    data:
      area: '{{ area }}'
    response_variable: window
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ window.open }}'
      sequence:
      - action: climate.set_hvac_mode
        target:
          entity_id: '{{ thermostat }}'
        data:
          hvac_mode: 'off'
    - conditions:
      - condition: template
        value_template: '{{ not window.open }}'
      sequence:
      - action: climate.set_hvac_mode
        target:
          entity_id: '{{ thermostat }}'
        data:
          hvac_mode: heat
heizkreisventilsteuerung_cooling:
  alias: HeizkreisVentilSteuerung Cooling
  description: Schliesst im Kuehlbetrieb den Heizkreis (ZBMINI aus), wenn ein Fenster
    laenger als 5 Minuten offen steht - als Schimmelschutz.
  mode: parallel
  max: 32
  fields:
    zbmini_entity:
      description: Der SONOFF ZBMINIR2 im Raum, dessen Heizkreis-Relay geschaltet
        wird
      required: true
  variables:
    area: '{{ area_id(zbmini_entity) }}'
  sequence:
  - condition: template
    value_template: '{{ area is not none }}'
  - action: script.any_window_open
    data:
      area: '{{ area }}'
    response_variable: window
  - condition: template
    value_template: '{{ window.open }}'
  - wait_template: '{{ expand(area_entities(area)) | selectattr(''domain'',''eq'',''binary_sensor'')
      | selectattr(''attributes.device_class'',''eq'',''window'') | selectattr(''state'',''eq'',''on'')
      | list | length == 0 }}'
    timeout: 00:05:00
    continue_on_timeout: true
  - condition: template
    value_template: '{{ not wait.completed }}'
  - action: switch.turn_off
    target:
      entity_id: '{{ zbmini_entity }}'
any_window_open:
  alias: AnyWindowOpen
  description: Prueft, ob in einer Area mindestens ein Fenster geoeffnet ist.
  mode: parallel
  max: 32
  fields:
    area:
      description: Die Area-ID, in der die Fenster-Sensoren geprueft werden.
      required: true
  variables:
    result:
      open: '{{ expand(area_entities(area)) | selectattr(''domain'',''eq'',''binary_sensor'')
        | selectattr(''attributes.device_class'',''eq'',''window'') | selectattr(''state'',''eq'',''on'')
        | list | length > 0 }}'
  sequence:
  - stop: Fenster-Status ermittelt
    response_variable: result
playmedia:
  sequence:
  - variables:
      mp_entity: "{% set entities = device_entities(target_device)\n   | select('match',
        '^media_player\\.')\n   | list %}\n{{ entities[0] if entities|length > 0 else
        '' }}\n"
  - condition: template
    value_template: '{{ mp_entity != '''' }}'
  - variables:
      initial_volume: '{{ state_attr(mp_entity, ''volume_level'') | float(0.4) }}'
  - target:
      entity_id: '{{ mp_entity }}'
    data:
      volume_level: '{{ target_volume }}'
    action: media_player.volume_set
  - action: media_player.play_media
    target:
      entity_id: '{{ mp_entity }}'
    data:
      media:
        media_content_id: '{{ ''media-source://media_source/local/'' ~ path }}'
        media_content_type: audio/mpeg
        metadata: {}
  - wait_template: '{{ not is_state(mp_entity, ''playing'') }}

      '
    timeout: 00:02:00
    continue_on_timeout: true
  - target:
      entity_id: '{{ mp_entity }}'
    data:
      volume_level: '{{ initial_volume }}'
    action: media_player.volume_set
  alias: PlayMedia
  description: Speichert die aktuelle Lautstärke, erhöht sie, gibt aus und setzt auf
    Original zurück
  mode: parallel
  max: 100
  fields:
    path:
      selector:
        text:
      name: AudioDatei
      required: true
    target_device:
      name: Zielgerät (HomePod)
      description: Wähle das HomePod-Device
      selector:
        device:
          multiple: false
      required: true
    target_volume:
      selector:
        number:
          min: 0
          max: 1
          step: 0.05
      default: 0.8
setheizkreisventilebetriebsmodus:
  alias: SetHeizkreisventileBetriebsmodus
  description: Setzt Detached und das Relay aller Heizkreisventile, die von einem
    Thermostat gesteuert werden und evaluiert danach den Fenster-Zustand für einen
    Sync.
  mode: queued
  max: 10
  variables:
    ventilSwitches: '{{ expand(''switch.heizkreisventile'') | map(attribute=''entity_id'')
      | list }}'
  sequence:
  - repeat:
      for_each: '{{ ventilSwitches }}'
      sequence:
      - variables:
          name: '{{ repeat.item.split(''.'')[1] }}'
          detached: switch.{{ name }}_detach_relay
          area: '{{ area_id(repeat.item) }}'
          thermostat: "{{\n  expand(area_entities(area))\n  | selectattr('domain','eq','climate')\n
            \ | map(attribute='entity_id')\n  | list | first\n}}"
      - choose:
        - conditions:
          - condition: state
            entity_id: sensor.heizungsbetriebsmodus
            state: Heating
          - condition: template
            value_template: '{{ is_state(detached, ''on'') }}'
          sequence:
          - action: switch.turn_off
            target:
              entity_id: '{{ detached }}'
          - action: switch.turn_off
            target:
              entity_id: '{{ repeat.item }}'
          - action: climate.set_hvac_mode
            target:
              entity_id: '{{ thermostat }}'
            data:
              hvac_mode: 'off'
          - action: script.heizkreisventilsteuerung
            data:
              zbmini_entity: '{{ repeat.item }}'
        - conditions:
          - condition: state
            entity_id: sensor.heizungsbetriebsmodus
            state: Cooling
          sequence:
          - action: switch.turn_on
            target:
              entity_id:
              - '{{ detached }}'
              - '{{ repeat.item }}'
            data: {}
bewasserung_kreis_ausfuhren:
  alias: Bewässerung Kreis ausführen
  mode: queued
  max: 10
  fields:
    ventil:
      required: true
    dauer_minuten:
      required: true
  sequence:
  - action: valve.open_valve
    target:
      entity_id: '{{ ventil }}'
  - delay:
      minutes: '{{ dauer_minuten | int }}'
  - action: valve.close_valve
    target:
      entity_id: '{{ ventil }}'
  description: ''
legionellenprogramm_warmwasser:
  alias: Legionellenprogramm Warmwasser
  description: Hebt Warmwasser auf Legionellentemperatur, wartet bis mindestens 61
    °C erreicht sind, hält 30 Minuten und stellt danach die normalen Werte wieder
    her.
  mode: single
  variables:
    LegioTemp: 59
    LegioHyst: 1
    DefaultTemp: 46
    DefaultHyst: 3
  sequence:
  - alias: WW-Sollwerte auf Legionellenbetrieb setzen
    action: number.set_value
    target:
      entity_id:
      - number.heizung_ww_eco_temp
      - number.heizung_ww_komf_temp
      - number.heizung_speichersolltemp
    data:
      value: '{{ LegioTemp + LegioHyst }}'
  - alias: WW-Hysterese auf Legionellenbetrieb setzen
    action: number.set_value
    target:
      entity_id: number.heizung_ww_hysterese
    data:
      value: '{{ LegioHyst }}'
  - alias: Maximal 1 Stunde warten bis Speicher mindestens 61 °C erreicht
    wait_template: '{{ states(''sensor.heizung_speicheristtemp'') | float(-999) >=
      LegioTemp }}'
    timeout: 01:00:00
    continue_on_timeout: true
  - alias: Nur bei erreichter Temperatur 30 Minuten halten
    choose:
    - conditions:
      - condition: template
        value_template: '{{ wait.completed }}'
      sequence:
      - delay: 00:30:00
  - alias: WW-Hysterese zurücksetzen
    action: number.set_value
    target:
      entity_id: number.heizung_ww_hysterese
    data:
      value: '{{ DefaultHyst }}'
  - alias: WW-Sollwerte zurücksetzen
    action: number.set_value
    target:
      entity_id:
      - number.heizung_ww_eco_temp
      - number.heizung_ww_komf_temp
      - number.heizung_speichersolltemp
    data:
      value: '{{ DefaultTemp }}'
